name: Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    branches: [main]
    types: [completed]

  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      skip_smoke_tests:
        description: Skip post-deployment smoke tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment || 'development' }}
  cancel-in-progress: false

jobs:
  pre-deployment:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    outputs:
      deploy-environment: ${{ steps.env-config.outputs.environment }}
      should-deploy: ${{ steps.env-config.outputs.should-deploy }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure deployment environment
        id: env-config
        env:
          REQUESTED_ENVIRONMENT: ${{ inputs.environment || '' }}
        run: bash .github/scripts/deploy.sh select-environment "$GITHUB_EVENT_NAME" "$REQUESTED_ENVIRONMENT"

      - name: Validate Azure configuration
        run: bash .github/scripts/deploy.sh validate-config

  deploy:
    name: Deploy to Azure (${{ needs.pre-deployment.outputs.deploy-environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: pre-deployment
    if: needs.pre-deployment.outputs.should-deploy == 'true'

    outputs:
      deployment-url: ${{ steps.deploy.outputs.uri }}
      azure-env-name: ${{ steps.configure.outputs.azure-env-name }}

    environment:
      name: ${{ needs.pre-deployment.outputs.deploy-environment }}
      url: ${{ steps.deploy.outputs.uri }}

    permissions:
      id-token: write
      contents: read

    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v1.0.0

      - name: Log in to Azure with federated credentials
        if: vars.AZURE_CLIENT_ID != ''
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: bash .github/scripts/deploy.sh login-oidc

      - name: Log in to Azure with service principal fallback
        if: vars.AZURE_CLIENT_ID == ''
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: bash .github/scripts/deploy.sh login-service-principal

      - name: Configure azd environment
        id: configure
        run: bash .github/scripts/deploy.sh configure-azd "${{ needs.pre-deployment.outputs.deploy-environment }}"

      - name: Provision and deploy application
        id: deploy
        run: bash .github/scripts/deploy.sh deploy

      - name: Upload sanitized deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs-${{ needs.pre-deployment.outputs.deploy-environment }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 14

  post-deployment:
    name: Post-deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pre-deployment, deploy]
    if: >
      needs.deploy.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.skip_smoke_tests != true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run smoke tests
        env:
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment-url }}
        run: bash .github/scripts/deploy.sh smoke

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [pre-deployment, deploy, post-deployment]
    if: always() && needs.pre-deployment.outputs.should-deploy == 'true'

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment summary
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.pre-deployment.outputs.deploy-environment }}
          AZURE_ENV_NAME_OUTPUT: ${{ needs.deploy.outputs.azure-env-name }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          POST_DEPLOYMENT_RESULT: ${{ needs.post-deployment.result }}
          DEPLOYMENT_URL: ${{ needs.deploy.outputs.deployment-url }}
        run: bash .github/scripts/deploy.sh summary

      - name: Create GitHub issue on failure
        if: needs.deploy.result == 'failure' || needs.post-deployment.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment failure: ${context.sha.substring(0, 7)}`,
              body: `## Deployment Failure Report

            **Environment**: ${{ needs.pre-deployment.outputs.deploy-environment }}
            **Azure environment**: ${{ needs.deploy.outputs.azure-env-name }}
            **Commit**: ${context.sha}
            **Workflow**: ${context.workflow}
            **Run ID**: ${context.runId}

            **Status**:
            - Deploy: ${{ needs.deploy.result }}
            - Post-deployment: ${{ needs.post-deployment.result }}

            Review the workflow logs and deployment output.

            [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
              labels: ['deployment', 'bug', 'high-priority']
            })