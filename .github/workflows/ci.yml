name: CI - Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: barodybroject.settings.testing
  DEV_COMPOSE: .devcontainer/docker-compose_dev.yml

jobs:
  pre-checks:
    name: Django Pre-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_barodydb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: bash .github/scripts/ci-install-system-deps.sh django

      - name: Install Python dependencies
        run: bash .github/scripts/python-install.sh runtime

      - name: Run Django pre-checks
        run: bash .github/scripts/django-prechecks.sh
        env:
          SECRET_KEY: ci-test-key-not-for-production
          DEBUG: "False"
          DB_CHOICE: postgres
          DB_HOST: localhost
          DB_NAME: ci_barodydb
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_SCHEMA: public

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre-checks

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_barodydb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: bash .github/scripts/ci-install-system-deps.sh test

      - name: Install Python dependencies
        run: bash .github/scripts/python-install.sh test

      - name: Run pytest
        run: bash .github/scripts/run-pytest.sh
        env:
          SECRET_KEY: ci-test-key-not-for-production
          DEBUG: "True"
          DB_CHOICE: postgres
          DB_HOST: localhost
          DB_NAME: test_barodydb
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_SCHEMA: public

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: django-coverage-xml
          path: src/coverage.xml
          if-no-files-found: error

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre-checks

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_seed
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: bash .github/scripts/ci-install-system-deps.sh e2e

      - name: Install Python dependencies
        run: bash .github/scripts/python-install.sh e2e

      - name: Run Playwright E2E
        run: bash .github/scripts/e2e-tests.sh
        env:
          SECRET_KEY: ci-test-key-not-for-production
          DEBUG: "True"
          DB_CHOICE: postgres
          DB_HOST: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          E2E_USERNAME: e2e_user
          E2E_EMAIL: e2e_user@example.com
          E2E_PASSWORD: e2e_password

  quality:
    name: Quality and Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: bash .github/scripts/ci-install-system-deps.sh quality

      - name: Install lint tools
        run: bash .github/scripts/python-install.sh lint

      # TEMPORARY (see PR #134 residual debt): non-blocking until the ~75
      # outstanding ruff findings are fixed or ignore-listed via [tool.ruff]
      # in pyproject.toml. Remove continue-on-error once ruff is clean.
      - name: Run lint checks
        continue-on-error: true
        run: bash .github/scripts/quality.sh lint

      - name: Install dependency audit tools
        run: bash .github/scripts/python-install.sh security

      - name: Run dependency scans
        run: bash .github/scripts/quality.sh dependency-scan

      - name: Install quality analysis tools
        run: bash .github/scripts/python-install.sh quality

      - name: Run quality analysis
        run: bash .github/scripts/quality.sh metrics

      - name: Run environment validation
        run: bash .github/scripts/quality.sh environment

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-and-security-reports
          path: |
            bandit-report.json
            secrets-scan.json
            src/safety-report.json
            src/pip-audit-report.json
            src/pylint-report.*
            src/mypy-report/
            src/radon-*.json

  container-validation:
    name: Container Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service: [python, jekyll]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose files
        run: bash .github/scripts/compose-validation.sh validate

      - name: Run Compose smoke test
        if: matrix.service == 'python'
        run: bash .github/scripts/compose-validation.sh smoke

      - name: Build and test service
        run: bash .github/scripts/compose-validation.sh build-service ${{ matrix.service }}

  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image for scanning
        run: bash .github/scripts/compose-validation.sh build-production-image barodybroject:security-scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: barodybroject:security-scan
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: trivy-results.sarif

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [pre-checks, tests, e2e, quality, container-validation, container-security]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required jobs
        run: >-
          bash .github/scripts/check-job-results.sh
          pre-checks=${{ needs.pre-checks.result }}
          tests=${{ needs.tests.result }}
          e2e=${{ needs.e2e.result }}
          quality=${{ needs.quality.result }}
          container-validation=${{ needs.container-validation.result }}
          container-security=${{ needs.container-security.result }}